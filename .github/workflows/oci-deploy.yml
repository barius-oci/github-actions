name: OCI Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required to request the GitHub OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub OIDC token
        id: oidc_token
        run: |
          IDTOKEN=$(curl -sS \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/barius-oci" \
            | jq -r '.value')
          echo "id_token=$IDTOKEN" >> $GITHUB_OUTPUT

      - name: Exchange OIDC token for OCI UPST
        id: exchange_token
        env:
          OCI_CLIENT_ID: ${{ secrets.OCI_TOKEN_EXCHANGE_CLIENT_ID }}
          OCI_CLIENT_SECRET: ${{ secrets.OCI_TOKEN_EXCHANGE_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          # Generate a throwaway RSA key pair — OCI binds the UPST to this public key
          openssl genrsa -out private.pem 2048 2>/dev/null
          PUBLIC_KEY=$(openssl rsa -in private.pem -pubout -outform DER 2>/dev/null | base64 -w 0)

          ENCODED_AUTH=$(echo -n "$OCI_CLIENT_ID:$OCI_CLIENT_SECRET" | base64 -w 0)
          ID_TOKEN="${{ steps.oidc_token.outputs.id_token }}"

          RESPONSE=$(curl -sS -X POST "${{ secrets.OCI_TOKEN_EXCHANGE_ENDPOINT }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Authorization: Basic $ENCODED_AUTH" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "requested_token_type=urn:oci:token-type:oci-upst" \
            --data-urlencode "subject_token=$ID_TOKEN" \
            --data-urlencode "subject_token_type=jwt" \
            --data-urlencode "public_key=$PUBLIC_KEY")

          echo "Response: $RESPONSE"

          UPST=$(echo "$RESPONSE" | jq -r '.token')
          if [ -z "$UPST" ] || [ "$UPST" = "null" ]; then
            echo "ERROR: Failed to obtain UPST"
            exit 1
          fi

          echo "UPST obtained successfully (length: ${#UPST})"
          echo "upst=$UPST" >> $GITHUB_OUTPUT

          # Save private key for request signing in subsequent steps
          echo "PRIVATE_KEY_PATH=private.pem" >> $GITHUB_ENV

      - name: Verify OCI access
        run: |
          echo "UPST token length: ${{ steps.exchange_token.outputs.upst != '' && 'OK' || 'EMPTY' }}"
          echo "OCI OIDC authentication successful"
          # Your deployment commands go here, using OCI CLI with security_token auth:
          # oci --auth security_token <command>
